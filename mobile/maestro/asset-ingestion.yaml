appId: com.dubbridge.mobile
name: Asset Ingestion
tags:
  - android
  - s-060
  - asset-ingestion
# BDD scenarios: SC-INGEST-1, SC-INGEST-2
---
- launchApp:
    clearState: true

- repeat:
    times: 3
    commands:
      - runFlow:
          when:
            visible:
              text: ".*isn't responding.*"
          commands:
            - tapOn: Wait

- extendedWaitUntil:
    visible:
      id: login-screen
    timeout: 20000

- assertVisible:
    id: login-screen

- runFlow: e2e-login.yaml

- assertVisible:
    id: home-screen

- tapOn:
    id: home-open-upload

- extendedWaitUntil:
    visible:
      id: upload-screen
    timeout: 20000

- assertVisible:
    id: upload-screen
- tapOn: Pick file

- extendedWaitUntil:
    visible:
      text: Upload & finalize
    timeout: 10000

- assertVisible: Upload & finalize
- assertVisible: dubbridge-e2e-upload.mov

- takeScreenshot: 05_upload

# SC-INGEST-1: tap finalize → processing → asset list (success navigation)
- tapOn:
    id: upload-finalize

- repeat:
    times: 3
    commands:
      - runFlow:
          when:
            visible:
              text: ".*isn't responding.*"
          commands:
            - tapOn: Wait

- extendedWaitUntil:
    visible:
      id: asset-list-screen
    timeout: 30000

- assertVisible:
    id: asset-list-screen

- takeScreenshot: 06_ingest_complete
