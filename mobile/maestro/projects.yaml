appId: com.dubbridge.mobile
name: Project surfaces
tags:
  - android
  - s-100
  - projects
# BDD scenarios: SC-ORG-1, SC-PROJECT-1
---
- launchApp:
    clearState: true

- repeat:
    times: 3
    commands:
      - runFlow:
          when:
            visible:
              text: ".*isn't responding.*"
          commands:
            - tapOn: Wait

- extendedWaitUntil:
    visible:
      id: login-screen
    timeout: 20000

- assertVisible:
    id: login-screen

- runFlow: e2e-login.yaml

- assertVisible:
    id: home-screen

- takeScreenshot: 08_home_for_projects

# SC-ORG-1: choose a real organization context from the authenticated UI
- tapOn:
    id: home-open-organizations

- repeat:
    times: 3
    commands:
      - runFlow:
          when:
            visible:
              text: ".*isn't responding.*"
          commands:
            - tapOn: Wait

- extendedWaitUntil:
    visible:
      id: organization-list-screen
    timeout: 20000

- assertVisible:
    id: organization-card-org-seed-1

- tapOn:
    id: organization-projects-org-seed-1

- extendedWaitUntil:
    visible:
      id: project-list-screen
    timeout: 20000

- assertVisible:
    id: project-list-screen

- assertVisible:
    id: project-card-project-seed-1

- takeScreenshot: 09_project_list

# SC-PROJECT-1: tap project card → project detail with linked assets
- tapOn:
    id: project-card-project-seed-1

- repeat:
    times: 3
    commands:
      - runFlow:
          when:
            visible:
              text: ".*isn't responding.*"
          commands:
            - tapOn: Wait

- extendedWaitUntil:
    visible:
      id: project-detail-screen
    timeout: 20000

- assertVisible:
    id: project-detail-screen

- assertVisible:
    id: asset-row-asset-seed-1

- takeScreenshot: 10_project_detail
