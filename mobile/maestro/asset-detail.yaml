appId: com.dubbridge.mobile
name: Asset Detail
tags:
  - android
  - s-060
  - asset-detail
# BDD scenario: SC-DETAIL-1
---
- launchApp:
    clearState: true

- repeat:
    times: 3
    commands:
      - runFlow:
          when:
            visible:
              text: ".*isn't responding.*"
          commands:
            - tapOn: Wait

- extendedWaitUntil:
    visible:
      id: login-screen
    timeout: 20000

- assertVisible:
    id: login-screen

- runFlow: e2e-login.yaml

- assertVisible:
    id: home-screen

- tapOn:
    id: home-open-assets

- extendedWaitUntil:
    visible:
      id: asset-list-screen
    timeout: 20000

- assertVisible:
    id: asset-card-asset-seed-1

- tapOn:
    id: asset-card-asset-seed-1

- repeat:
    times: 3
    commands:
      - runFlow:
          when:
            visible:
              text: ".*isn't responding.*"
          commands:
            - tapOn: Wait

- extendedWaitUntil:
    visible:
      id: asset-detail-screen
    timeout: 20000

- assertVisible:
    id: asset-detail-screen

- assertVisible: Demo Reel 2026
- assertVisible: Ready

# Technical details accordion (D5/T5): ids are hidden by default; expand before asserting
- tapOn:
    id: asset-tech-details-toggle

- assertVisible: asset-seed-1
- assertVisible: e2e-user

- takeScreenshot: 04_asset_detail
