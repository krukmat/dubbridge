appId: com.dubbridge.mobile
name: Authenticated Audit
tags:
  - android
  - p3-v
  - authenticated-audit
---
- launchApp:
    clearState: true

- repeat:
    times: 20
    commands:
      - runFlow:
          when:
            visible:
              text: ".*isn't responding.*"
          commands:
            - tapOn: Wait
      - waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: login-screen
    timeout: 20000

- assertVisible:
    id: login-screen

- runFlow: e2e-login.yaml

- assertVisible:
    id: home-screen

- takeScreenshot: 02_home
