# config/production.toml — production environment non-secret values.
# Secrets (database_url, redis_url, auth credentials) are injected via
# DUBBRIDGE_* env vars and must never appear in this file (ADR-026, Decision 4).
#
# NOTE: This profile is configuration-valid once representative secrets are injected.
# Runtime behavior for the `s3` selector still lands in later phases when
# `build_adapter` and observability wiring consume these settings.

env = "production"

[storage]
backend = "s3"
base_path = ""
bucket = "dubbridge-production"

[observability]
log_format = "json"
filter = "info"

[gateway]
port = 8081
upstream_api_base_url = "https://api.dubbridge.example"
mobile_return_uris = ["dubbridge://auth/callback", "https://mobile.dubbridge.example/auth/callback"]

[gateway.oauth]
authorization_url = "https://auth.dubbridge.example/oauth/authorize"
token_url = "https://auth.dubbridge.example/oauth/token"
client_id = "dubbridge-web"
redirect_url = "https://gateway.dubbridge.example/auth/callback"

[gateway.session]
cookie_name = "dubbridge_session"
absolute_ttl_seconds = 28800
idle_ttl_seconds = 1800
