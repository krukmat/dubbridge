# config/staging.toml — staging environment non-secret values.
# Secrets (database_url, redis_url, auth credentials) are injected via
# DUBBRIDGE_* env vars and must never appear in this file (ADR-026, Decision 4).

env = "staging"

[storage]
backend = "s3"
base_path = ""
bucket = "dubbridge-staging"

[observability]
log_format = "json"
filter = "info"

[gateway]
port = 8081
upstream_api_base_url = "https://api.staging.dubbridge.example"

[gateway.oauth]
authorization_url = "https://auth.staging.dubbridge.example/oauth/authorize"
token_url = "https://auth.staging.dubbridge.example/oauth/token"
client_id = "dubbridge-web-staging"
redirect_url = "https://gateway.staging.dubbridge.example/auth/callback"

[gateway.session]
cookie_name = "dubbridge_session"
absolute_ttl_seconds = 28800
idle_ttl_seconds = 1800
