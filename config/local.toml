# config/local.toml — local development values.
# These are the former in-code unwrap_or(...) defaults, now living here
# instead of compiled into the binary (ADR-026, Decision 2).
# No secrets here — secrets go in .env (git-ignored).

env = "local"

database_url = "postgres://dubbridge:dubbridge@localhost:5432/dubbridge"
redis_url = "redis://127.0.0.1:6379"

[storage]
backend = "local_fs"
base_path = "/tmp/dubbridge-storage"
bucket = "dubbridge-local"

[observability]
log_format = "pretty"
filter = "info"

[gateway]
port = 8081
upstream_api_base_url = "http://localhost:8080"
mobile_return_uris = ["dubbridge://auth/callback", "https://mobile.local.dubbridge.example/auth/callback"]

[gateway.oauth]
authorization_url = "http://localhost:9000/oauth/authorize"
token_url = "http://localhost:9000/oauth/token"
client_id = "dubbridge-web-local"
redirect_url = "http://localhost:8081/auth/callback"

[gateway.session]
cookie_name = "dubbridge_session"
absolute_ttl_seconds = 28800
idle_ttl_seconds = 1800
