name: push-review

on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]

permissions:
  actions: read
  contents: write

jobs:
  advisory-push-review:
    if: github.event.workflow_run.event == 'push'
    runs-on:
      - self-hosted
      - macOS
      - ARM64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Run advisory push review
        id: push_review
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          DUBBRIDGE_PUSH_REVIEW_EVENT_PATH: ${{ github.event_path }}
          DUBBRIDGE_PUSH_REVIEW_RUN_ID: ${{ github.event.workflow_run.id }}
          DUBBRIDGE_PUSH_REVIEW_WORKFLOW: ${{ github.event.workflow_run.name }}
          DUBBRIDGE_PUSH_REVIEW_BRANCH: ${{ github.event.workflow_run.head_branch }}
          DUBBRIDGE_PUSH_REVIEW_AFTER: ${{ github.event.workflow_run.head_sha }}
          DUBBRIDGE_PUSH_REVIEW_OUT_DIR: logs/gemma-push-review/${{ github.event.workflow_run.head_sha }}/${{ github.run_id }}
        run: make qa-gemma-push-review

      - name: Commit push-review report and daily entry
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail

          SHORT_SHA="${HEAD_SHA:0:7}"
          TODAY="$(date -u +%Y-%m-%d)"
          OUT_DIR="logs/gemma-push-review/${HEAD_SHA}/${RUN_ID}"
          REPORT_SRC="${OUT_DIR}/reports/${TODAY}-${SHORT_SHA}.md"
          REPORT_DST="docs/reports/push-review/${TODAY}-${SHORT_SHA}.md"
          DAILY="docs/daily/${TODAY}.md"

          # Copy report if it was generated
          if [ -f "$REPORT_SRC" ]; then
            cp "$REPORT_SRC" "$REPORT_DST"
            REPORT_LINK="[${TODAY}-${SHORT_SHA}.md](${REPORT_DST})"
          else
            REPORT_LINK="(no report generated)"
          fi

          # Read aggregate for table fields
          AGGREGATE="${OUT_DIR}/aggregate.json"
          if [ -f "$AGGREGATE" ]; then
            STATUS=$(python3 -c "import json,sys; d=json.load(open('$AGGREGATE')); print(d.get('status','?'))" 2>/dev/null || echo "?")
            QUORUM=$(python3 -c "import json,sys; d=json.load(open('$AGGREGATE')); print(d.get('audit',{}).get('quorum','?'))" 2>/dev/null || echo "?")
            PASSES=$(python3 -c "import json,sys; d=json.load(open('$AGGREGATE')); a=d.get('audit',{}); print(f\"{a.get('passes_succeeded','?')}/{a.get('passes_run','?')}\")" 2>/dev/null || echo "?/?")
            ROUTING=$(python3 -c "
import json, sys
d = json.load(open('$AGGREGATE'))
routings = list({c.get('routing','?') for c in d.get('candidates',[])})
print(', '.join(routings) if routings else 'none')
" 2>/dev/null || echo "?")
            CI_CONCLUSION=$(python3 -c "import json,sys; d=json.load(open('$AGGREGATE')); print(d.get('pipeline',{}).get('conclusion','?'))" 2>/dev/null || echo "?")
          else
            STATUS="blocked"; QUORUM="?"; PASSES="?/?"; ROUTING="?"; CI_CONCLUSION="?"
          fi

          PR_ROW="| \`${RUN_ID} / ${SHORT_SHA}\` | ${CI_CONCLUSION} | ${STATUS} (${PASSES} passes, quorum ${QUORUM}) | ${ROUTING} | ${REPORT_LINK} |"

          # Create daily if it doesn't exist
          if [ ! -f "$DAILY" ]; then
            python3 - <<PYEOF
import subprocess, datetime

today = "$TODAY"
branch = subprocess.run(["git","rev-parse","--abbrev-ref","HEAD"], capture_output=True, text=True).stdout.strip()

content = f"""# Daily — {today}

**Branch:** {branch} · **Sync:** synced · **Gates:** \`fmt:❓ docs:❓\`
**Foco del día:** (sembrado automáticamente por push-review)

---

## 1. Roadmap pulse

- **Fase activa:** por determinar
- **Desbloquea al cerrar:** —
- **Gates de fundación en riesgo:** ninguno
- **X-items que se movieron:** —

---

## 2. Pipelines GH rotos

| Workflow | Último fallo | Estado | Acción |
|---|---|---|---|
| — | — | limpio | — |

---

## 3. Push-review post-pipeline

| Run / SHA | Conclusión pipeline | Estado push-review | RRI / routing | Acción |
|---|---|---|---|---|

---

## 4. Ayer → Hoy

| Estado | Task | Banda RRI | Nota |
|---|---|---|---|

---

## 5. Issues ledger

| Hora | Sev | Tipo | Descripción | Estado | Acción |
|---|---|---|---|---|---|

---

## 6. Optimizaciones y mejoras

| ID | Tipo | Propuesta | Impacto | Esfuerzo | → Task? |
|---|---|---|---|---|---|

---

## 7. Decisiones pendientes (HITL gate)

- [ ] (ninguna al abrir)

---

## 8. Cierre del día ✓

- [ ] \`git status\` limpio — sin trabajo declarado "done" sin commitear
- [ ] Roadmap ↔ ledgers ↔ git consistentes (drift-check emite 0 🔴)
- [ ] Pipelines GH rotos revisados; si existe alguno, quedó con owner o task
- [ ] Push-review más reciente revisado; findings no-pure-Low y patches \`in_review\` registrados o referenciados
- [ ] Gates verdes: fmt, lint, test, check, deny, secrets, cov, docs — o BLOCKER abierto
- [ ] X-items tocados hoy reflejados en roadmap
- [ ] Daily de mañana sembrado con lo \`[~]\` que queda
"""
with open("$DAILY", "w") as f:
    f.write(content)
PYEOF
          fi

          # Append push-review row to section 3 of the daily
          python3 - <<PYEOF
import re

daily_path = "$DAILY"
row = """$PR_ROW"""

with open(daily_path, "r") as f:
    content = f.read()

# Insert row before the closing --- of section 3
# Find the table header line and insert after last data row
table_header = "| Run / SHA | Conclusión pipeline | Estado push-review | RRI / routing | Acción |"
sep = "|---|---|---|---|---|"

if table_header in content:
    # Find position after the separator row and any existing data rows
    idx = content.find(sep, content.find(table_header))
    if idx != -1:
        # Find end of table (blank line or ---)
        after_sep = content[idx + len(sep):]
        lines_after = after_sep.split("\n")
        insert_at = idx + len(sep)
        for line in lines_after:
            if line.startswith("|"):
                insert_at += len(line) + 1
            else:
                break
        content = content[:insert_at] + "\n" + row + content[insert_at:]
        with open(daily_path, "w") as f:
            f.write(content)
        print(f"Row appended to {daily_path}")
    else:
        print("Separator not found, skipping daily update")
else:
    print("Table header not found in daily, skipping")
PYEOF

          # Git commit
          git config user.name "push-review[bot]"
          git config user.email "push-review@dubbridge.local"
          git add "$REPORT_DST" "$DAILY" 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "chore(push-review): report ${SHORT_SHA} + daily ${TODAY} entry"
            git push origin HEAD:main
          fi

      - name: Upload push-review artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: push-review-${{ github.event.workflow_run.head_sha }}-${{ github.run_id }}
          path: logs/gemma-push-review/${{ github.event.workflow_run.head_sha }}/${{ github.run_id }}/
          if-no-files-found: ignore

      - name: Advisory summary
        if: always()
        run: |
          echo "Primary CI remains authoritative."
          echo "Push review is advisory and post-pipeline."
          if [ "${{ steps.push_review.outcome }}" != "success" ]; then
            echo "Push review produced a blocked/degraded result or operational failure."
          fi
