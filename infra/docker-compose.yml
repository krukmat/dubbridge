services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: dubbridge
      POSTGRES_USER: dubbridge
      POSTGRES_PASSWORD: dubbridge
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: dubbridge
      MINIO_ROOT_PASSWORD: dubbridge123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  api:
    image: rust:1.88
    working_dir: /workspace
    command: cargo run -p dubbridge-api
    volumes:
      - ..:/workspace
    depends_on:
      - postgres
      - redis
      - minio

  worker-runner:
    image: rust:1.88
    working_dir: /workspace
    command: cargo run -p dubbridge-worker-runner
    volumes:
      - ..:/workspace
    depends_on:
      - postgres
      - redis
      - minio

  asr-worker-py:
    build:
      context: ../workers/asr-worker-py
    profiles: ["workers"]

  translation-worker-py:
    build:
      context: ../workers/translation-worker-py
    profiles: ["workers"]

  tts-worker-py:
    build:
      context: ../workers/tts-worker-py
    profiles: ["workers"]

volumes:
  postgres-data:
  minio-data:
