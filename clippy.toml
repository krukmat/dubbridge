# Exempt test code from the production-readiness restriction lints declared in
# Cargo.toml ([workspace.lints.clippy]). Tests legitimately panic, print, and
# use dbg!/unwrap/expect to assert behaviour.
allow-panic-in-tests = true
allow-print-in-tests = true
allow-dbg-in-tests = true
allow-unwrap-in-tests = true
allow-expect-in-tests = true

# SRP gate threshold for cognitive_complexity (deny in Cargo.toml).
# McCabe-equivalent ceiling: functions above this must be decomposed.
cognitive-complexity-threshold = 15
